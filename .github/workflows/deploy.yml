name: Build, Push to ECR & Deploy to EC2
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPO: banking-application

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set image tag
        id: vars
        run: echo "image_tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: Build & push backend image
        working-directory: ./backend
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:backend-${{ steps.vars.outputs.image_tag }} .
          docker tag ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:backend-${{ steps.vars.outputs.image_tag }} ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:backend-latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:backend-${{ steps.vars.outputs.image_tag }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:backend-latest
          
      - name: Build & push frontend image
        working-directory: ./frontend
        run: |
          docker build \
            --build-arg REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }} \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:frontend-${{ steps.vars.outputs.image_tag }} .
          docker tag ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:frontend-${{ steps.vars.outputs.image_tag }} ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:frontend-latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:frontend-${{ steps.vars.outputs.image_tag }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:frontend-latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Ensure deploy directory exists with correct ownership
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p /opt/banking-application
            sudo chown -R $(whoami):$(whoami) /opt/banking-application
            
      - name: Copy compose file & DB scripts to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,database/schema.sql,database/data.sql,nginx/default.conf"
          target: "/opt/banking-application"
          strip_components: 0
          
      - name: SSH deploy - pull images & restart containers
        uses: appleboy/ssh-action@v1.0.3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_DEFAULT_REGION,ECR_REGISTRY,IMAGE_TAG,DB_ROOT_PASSWORD,JWT_SECRET
          script: |
            set -e
            cd /opt/banking-application
            
            # Sanitize credentials
            export AWS_ACCESS_KEY_ID=$(echo "$AWS_ACCESS_KEY_ID" | xargs)
            export AWS_SECRET_ACCESS_KEY=$(echo "$AWS_SECRET_ACCESS_KEY" | xargs)
            export AWS_DEFAULT_REGION=$(echo "$AWS_DEFAULT_REGION" | xargs)

            # Install AWS CLI if not present
            if ! command -v aws &> /dev/null; then
              echo "AWS CLI not found, installing..."
              curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
              sudo apt-get update -y && sudo apt-get install -y unzip || sudo yum install -y unzip
              unzip -o awscliv2.zip
              sudo ./aws/install --update
              rm -rf awscliv2.zip aws
            fi
            
            # Install docker-compose if not present
            if ! command -v docker-compose &> /dev/null; then
              echo "docker-compose not found, installing..."
              sudo curl -L "https://github.com/docker/compose/releases/download/v2.28.1/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
              sudo ln -s /usr/local/bin/docker-compose /usr/bin/docker-compose || true
            fi
            
            # Create .env
            cat > .env << EOF
            ECR_REGISTRY=$ECR_REGISTRY
            IMAGE_TAG=$IMAGE_TAG
            DB_ROOT_PASSWORD=$DB_ROOT_PASSWORD
            JWT_SECRET=$JWT_SECRET
            EOF
            
            # Login to ECR
            aws ecr get-login-password --region "$AWS_DEFAULT_REGION" \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"
              
            # Pull and restart containers
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d
            docker image prune --force
