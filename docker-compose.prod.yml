services:
  mysql:
    image: mysql:8
    container_name: banking-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: banking
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/data.sql:/docker-entrypoint-initdb.d/2-data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    image: ${ECR_REGISTRY}/banking-application:backend-${IMAGE_TAG}
    container_name: banking-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: banking
      DB_USER: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
  frontend:
    image: ${ECR_REGISTRY}/banking-application:frontend-${IMAGE_TAG}
    container_name: banking-frontend
    restart: unless-stopped
    ports:
      - "80:3000"
    depends_on:
      - backend
volumes:
  mysql_data:
 
